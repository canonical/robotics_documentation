name: Markdown style checks

on:
  push:
    branches:
    - main
    paths:
    - 'docs/**'
  pull_request:
    branches:
    - '*'
    paths:
    - 'docs/**'

jobs:
  markdown-lint:
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v5
      with:
        fetch-depth: 0
    - uses: DavidAnson/markdownlint-cli2-action@v20
      with:
        config: "docs/.sphinx/.markdownlint.json"
        globs: |
          **/*.{md,markdown}
          !docs/.sphinx
          !docs/_build
