name: Markdown style checks

on:
  push:
    branches:
    - main
    paths:
    - 'docs/**'
    - '.github/workflows/markdown-style-checks.yml'
  pull_request:
    branches:
    - '*'
    paths:
    - 'docs/**'
    - '.github/workflows/markdown-style-checks.yml'
  workflow_dispatch:

jobs:
  markdown-lint:
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - uses: DavidAnson/markdownlint-cli2-action@v22
      with:
        config: "docs/.sphinx/.markdownlint.json"
        globs: |
          **/*.{md,markdown}
          !docs/.sphinx
          !docs/_build
